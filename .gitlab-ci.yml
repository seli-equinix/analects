# CCA Test Pipeline — Variable-driven test selection.
#
# Each test runs in its own pipeline for clean tracking.
# Trigger via Makefile:  make test NAME=eva-code-trace
# Or via API:  POST /pipeline  variables[RUN_TEST]=eva-code-trace
#
# RUN_TEST values:
#   Individual:  eva-code-trace, code-trace, bash-execution, etc.
#   Groups:      all-user, all-coder, all-integration
#   Everything:  all
#   Build only:  build

stages:
  - build
  - preflight
  - test

# Only trigger from web UI, API, or scheduled — NOT on push.
# This prevents 25 "manual" jobs cluttering every commit.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"
    - if: $CI_PIPELINE_SOURCE == "trigger"
    - if: $CI_PIPELINE_SOURCE == "schedule"

variables:
  RUN_TEST: ""
  PHOENIX_PROJECT_NAME: "cca-tests"
  CCA_RUN_JUDGE: "1"
  GIT_STRATEGY: fetch

# ── Reusable template for all test jobs ──
.test-base:
  stage: test
  image: 192.168.4.204:5000/cca-tests/test-runner:latest
  needs: [health-check]
  artifacts:
    when: always
    paths: ["report-*.xml"]
    reports:
      junit: "report-*.xml"
    expire_in: 90 days
  allow_failure: true

# ════════════════════════════════════════════
#  BUILD — rebuild test image when deps change
# ════════════════════════════════════════════

build-test-image:
  stage: build
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - docker login -u admin -p Loveme-sex64 192.168.4.204:5000
    - docker build -t 192.168.4.204:5000/cca-tests/test-runner:latest -f Dockerfile.test .
    - docker push 192.168.4.204:5000/cca-tests/test-runner:latest
  rules:
    - if: '$RUN_TEST == "build"'

# ════════════════════════════════════════════
#  PREFLIGHT — auto-runs before every test
# ════════════════════════════════════════════

health-check:
  stage: preflight
  image: 192.168.4.204:5000/cca-tests/test-runner:latest
  script:
    - echo "=== CCA Server ==="
    - curl -sf --max-time 10 $CCA_BASE_URL/health | python3 -m json.tool
    - echo "=== vLLM Server ==="
    - curl -sf --max-time 10 ${VLLM_BASE_URL%/v1}/health && echo "OK"
    - echo "=== Phoenix ==="
    - curl -sf --max-time 5 $PHOENIX_URL/ > /dev/null && echo "OK" || echo "WARNING - unreachable (non-fatal)"
  rules:
    - if: $RUN_TEST    # Runs whenever RUN_TEST is set (any test trigger)
  timeout: 2m

# ════════════════════════════════════════════
#  USER TESTS
# ════════════════════════════════════════════

test-new-user-onboarding:
  extends: .test-base
  script:
    - python -m pytest tests/user/test_new_user_onboarding.py -v --tb=short --with-judge --junitxml=report-new-user-onboarding.xml
  rules:
    - if: '$RUN_TEST == "new-user-onboarding"'
    - if: '$RUN_TEST == "all-user"'
    - if: '$RUN_TEST == "all"'
  timeout: 10m

