stages:
  - build
  - preflight
  - user
  - websearch
  - coder
  - integration
  - suite

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_PIPELINE_SOURCE == "api"

variables:
  PHOENIX_PROJECT_NAME: "cca-tests-ci"
  CCA_RUN_JUDGE: "1"
  GIT_STRATEGY: fetch

# ── Reusable template for all test jobs ──
.test-base:
  image: $CI_REGISTRY_IMAGE/test-runner:latest
  artifacts:
    when: always
    paths: ["report-*.xml"]
    reports:
      junit: "report-*.xml"
    expire_in: 90 days
  when: manual
  allow_failure: true

# ════════════════════════════════════════════
#  BUILD
# ════════════════════════════════════════════

build-test-image:
  stage: build
  image: docker:latest
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  script:
    - docker login -u root -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE/test-runner:latest -f Dockerfile.test .
    - docker push $CI_REGISTRY_IMAGE/test-runner:latest
  rules:
    - changes: [tests/requirements-test.txt, Dockerfile.test]
    - when: manual
      allow_failure: true

# ════════════════════════════════════════════
#  PREFLIGHT
# ════════════════════════════════════════════

health-check:
  stage: preflight
  image: $CI_REGISTRY_IMAGE/test-runner:latest
  script:
    - echo "=== CCA Server ===" && curl -sf --max-time 10 $CCA_BASE_URL/health | python3 -m json.tool
    - echo "=== vLLM Server ===" && curl -sf --max-time 10 ${VLLM_BASE_URL%/v1}/health
    - echo "=== Phoenix ===" && curl -sf --max-time 5 $PHOENIX_URL/ > /dev/null && echo "OK" || echo "WARNING - unreachable (non-fatal)"
  when: manual
  timeout: 2m

# ════════════════════════════════════════════
#  USER TESTS (3 tests)
# ════════════════════════════════════════════

test-new-user-onboarding:
  extends: .test-base
  stage: user
  script:
    - python -m pytest tests/user/test_new_user_onboarding.py -v --tb=short --with-judge --junitxml=report-new-user-onboarding.xml
  timeout: 10m

