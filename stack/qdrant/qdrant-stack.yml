# Qdrant Vector Database for CCA
# Stores code embeddings, conversation history, knowledge base, and CCA notes
#
# Deployment:
#   Start:   docker compose -f qdrant-stack.yml up -d
#   Stop:    docker compose -f qdrant-stack.yml down
#   Logs:    docker logs -f qdrant
#
# API Endpoints:
#   - REST API: http://localhost:6333
#   - gRPC: localhost:6334
#   - Dashboard: http://localhost:6333/dashboard

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "${QDRANT_REST_PORT:-6333}:6333"  # REST API + Dashboard
      - "${QDRANT_GRPC_PORT:-6334}:6334"  # gRPC
    volumes:
      - ${QDRANT_STORAGE:-/data/qdrant/storage}:/qdrant/storage
      - ${QDRANT_SNAPSHOTS:-/data/qdrant/snapshots}:/qdrant/snapshots
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__LOG_LEVEL=INFO
      # Performance tuning
      - QDRANT__STORAGE__ON_DISK_PAYLOAD=true
      - QDRANT__STORAGE__PERFORMANCE__MAX_SEARCH_THREADS=0
    restart: unless-stopped
